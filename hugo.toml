baseURL = "https://ckw2022.github.io/my-blog"
languageCode = "zh-cn"
title = "我的知识库"
theme = "PaperMod"

[params]
  defaultTheme = "auto"         
  ShowReadingTime = true        
  ShowShareButtons = false      
  ShowPostNavLinks = true       
  ShowBreadCrumbs = true        
  ShowCodeCopyButtons = true    
  ShowToc = true                
  TocOpen = true                

  [params.homeInfoParams]
    Title = "欢迎来到我的知识库"
    Content = "记录学习笔记与技术心得"

[[menu.main]]
  name = "首页"
  url = "/"
  weight = 1

[[menu.main]]
  name = "分类"
  url = "/categories/"
  weight = 2

[[menu.main]]
  name = "标签"
  url = "/tags/"
  weight = 3

[[menu.main]]
  name = "搜索"
  url = "/search/"
  weight = 4

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    codeFences = true
    lineNos = true
    style = "monokai"